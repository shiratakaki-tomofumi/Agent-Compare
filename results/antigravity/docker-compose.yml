version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bizboard
    ports:
      - '5432:5432'
    volumes:
      - bizboard_pgdata:/var/lib/postgresql/data

volumes:
  bizboard_pgdata:
